  name: GitHub Actions CI

  on:
    push:
      branches: [ main ]
    pull_request:
      branches: [ main ]
    workflow_dispatch:        # manual "Run workflow" button in the Actions tab

  jobs:
    test:
      name: Run MUnit + Enforce Coverage
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v5

        - name: Set up JDK 17
          uses: actions/setup-java@v5
          with:
            distribution: temurin
            java-version: '17'
            cache: maven

        - name: Run MUnit tests with coverage
          env:
            ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
            ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
          run: |
            set -o pipefail
            mvn clean test \
              --settings .github/settings.xml \
              --batch-mode \
              --no-transfer-progress 2>&1 \
              | grep -v 'org.apache.http.client.protocol.ResponseProcessCookies' \
              | tee mvn.log

        # Optional diagnostic — the coverage report dir varies by MUnit version.
        - name: Show where the coverage report landed
          if: always()
          run: |
            echo "=== coverage / munit artifacts under target ==="
            find target \( -iname '*coverage*' -o -iname '*munit*' -o -name '*.html' \) -print 2>/dev/null || true

        # Option A — render the coverage numbers on the workflow run page (no download)
        - name: Publish coverage to the run summary
          if: always()
          run: |
            {
              echo "### 🧪 MUnit Coverage"
              echo ""
              echo "Build status: **${{ job.status }}**"
              echo ""
              echo '```'
              grep -iE 'coverage|tests run|MUnit Run Summary' mvn.log || echo "no coverage lines captured"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

        # The downloadable full HTML report (unchanged — this is what worked)
        - name: Publish coverage report artifact
          if: always()
          uses: actions/upload-artifact@v7
          with:
            name: test-automation-coverage-report
            path: |
              target/META-INF/mule-src/*/reports/
              target/site/munit/coverage/
            if-no-files-found: warn

    security-scan:
      name: MuleSoft Security Best-Practices Scan
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v5

        - name: Run security scan
          run: |
            python3 .github/scripts/security-scan.py

        - name: Upload MuleSoft scan intermediate
          if: always()
          uses: actions/upload-artifact@v7
          with:
            name: sec-intermediate-mulesoft
            path: |
              security-report.md
              security-report.json
            retention-days: 1
            if-no-files-found: warn

    dependency-check:
      name: OSV Vulnerability Scan
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v5

        - name: Set up JDK 17
          uses: actions/setup-java@v5
          with:
            distribution: temurin
            java-version: '17'
            cache: maven

        - name: Install OSV-Scanner
          env:
            OSV_SCANNER_VERSION: "2.0.2"
          run: |
            curl -sSfL \
              "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" \
              -o /usr/local/bin/osv-scanner
            chmod +x /usr/local/bin/osv-scanner
            osv-scanner --version

        - name: Resolve Maven dependency tree
          env:
            ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
            ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
          run: |
            mvn --batch-mode --no-transfer-progress \
              --settings .github/settings.xml \
              dependency:tree -DoutputFile=maven-deps.txt -DoutputType=text

        - name: Run OSV Scanner
          run: |
            set +e
            # osv-scanner v2 uses the `scan source` subcommand for repo scans
            # and reads pom.xml via the Maven extractor. Force transitive
            # resolution so container/parent deps are included.
            osv-scanner scan source \
              --recursive \
              --experimental-resolution-data-source=native \
              --format=json \
              --output=osv-report.json \
              . 2>&1 | tee osv-run.log
            rc=${PIPESTATUS[0]}
            echo "osv-scan-exit-code=$rc" | tee -a osv-run.log
            # exit 0 = no vulns, exit 1 = vulns found. Both are successful
            # scans. Any other rc is a real error.
            if [[ $rc -ne 0 && $rc -ne 1 ]]; then
              {
                echo "OSV Scanner failed with exit code $rc."
                echo "Full run log is included alongside this file."
                echo ""
                echo "Last 100 lines of scanner output:"
                echo "----------------------------------------"
                tail -n 100 osv-run.log
              } > osv-error.log
            fi
            # Guarantee the JSON artifact exists even if the scan aborted.
            if [[ ! -f osv-report.json ]]; then
              echo '{"results":[]}' > osv-report.json
            fi
            exit 0

        - name: Upload OSV scan intermediate
          if: always()
          uses: actions/upload-artifact@v7
          with:
            name: sec-intermediate-osv
            path: |
              osv-report.json
              osv-run.log
              osv-error.log
            retention-days: 1
            if-no-files-found: warn

    gitleaks:
      name: Gitleaks Secret Scan
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v5
          with:
            fetch-depth: 0

        - name: Install Gitleaks
          env:
            GITLEAKS_VERSION: "8.28.0"
          run: |
            curl -sSfL \
              "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C /usr/local/bin gitleaks
            gitleaks version

        - name: Run Gitleaks
          run: |
            set +e
            gitleaks detect \
              --source . \
              --redact \
              --report-format json \
              --report-path gitleaks-report.json \
              --exit-code 1
            rc=$?
            # Guarantee an artifact even when the scan is clean and gitleaks
            # didn't write a file.
            if [[ ! -f gitleaks-report.json ]]; then
              echo '[]' > gitleaks-report.json
            fi
            exit $rc

        - name: Upload Gitleaks scan intermediate
          if: always()
          uses: actions/upload-artifact@v7
          with:
            name: sec-intermediate-gitleaks
            path: gitleaks-report.json
            retention-days: 1
            if-no-files-found: warn

    sbom:
      name: CycloneDX SBOM
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v5

        - name: Set up JDK 17
          uses: actions/setup-java@v5
          with:
            distribution: temurin
            java-version: '17'
            cache: maven

        - name: Generate CycloneDX SBOM
          run: |
            mvn --batch-mode --no-transfer-progress \
              --settings .github/settings.xml \
              org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom \
              -DoutputFormat=all \
              -DoutputName=sbom

        - name: Upload CycloneDX SBOM intermediate
          if: always()
          uses: actions/upload-artifact@v7
          with:
            name: sec-intermediate-cyclonedx
            path: |
              target/sbom.xml
              target/sbom.json
            retention-days: 1
            if-no-files-found: warn

    integration-test:
      name: Integration Test
      runs-on: ubuntu-latest
      needs: [test, security-scan, gitleaks, sbom]

      steps:
        - name: Checkout
          uses: actions/checkout@v5

        - name: Run integration tests against JSONPlaceholder
          run: |
            bash .github/scripts/integration-test.sh

    performance-test:
      name: Performance Test
      runs-on: ubuntu-latest
      needs: [integration-test]

      steps:
        - name: Checkout
          uses: actions/checkout@v5

        - name: Install Apache Bench
          run: |
            sudo apt-get update
            sudo apt-get install -y apache2-utils

        - name: Run performance tests against local mock
          env:
            REQUESTS: "100"
            CONCURRENCY: "10"
            MAX_MEAN_MS: "100"
            MAX_P95_MS: "200"
            MIN_SUCCESS_PCT: "99"
          run: |
            bash .github/scripts/performance-test.sh

    security-consolidated-report:
      name: Consolidated Security Report
      runs-on: ubuntu-latest
      needs: [performance-test, dependency-check]
      # Render whatever intermediates exist, even if some upstream scans failed.
      if: ${{ always() && needs.performance-test.result == 'success' }}
      permissions:
        # Required for the cleanup step to delete intermediate artifacts.
        actions: write
        contents: read

      steps:
        - name: Checkout
          uses: actions/checkout@v5

        - name: Download MuleSoft scan intermediate
          uses: actions/download-artifact@v8
          with:
            name: sec-intermediate-mulesoft
            path: mulesoft-scan
          continue-on-error: true

        - name: Download Gitleaks scan intermediate
          uses: actions/download-artifact@v8
          with:
            name: sec-intermediate-gitleaks
            path: gitleaks-scan
          continue-on-error: true

        - name: Download CycloneDX SBOM intermediate
          uses: actions/download-artifact@v8
          with:
            name: sec-intermediate-cyclonedx
            path: cyclonedx-scan
          continue-on-error: true

        - name: Download OSV scan intermediate
          uses: actions/download-artifact@v8
          with:
            name: sec-intermediate-osv
            path: osv-scan
          continue-on-error: true

        - name: Render consolidated HTML report
          run: |
            python3 .github/scripts/render-security-report.py

        - name: Publish consolidated security report artifact
          uses: actions/upload-artifact@v7
          with:
            name: test-automation-security-report
            path: security-report.html
            if-no-files-found: error

        - name: Delete intermediate scan artifacts
          if: always()
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            # GitHub's minimum artifact retention is 1 day, so intermediates
            # cannot be set to a shorter TTL declaratively. Instead, purge
            # them via the REST API as soon as the consolidated report is
            # built. Best-effort — a missing artifact is not an error.
            for name in \
              sec-intermediate-mulesoft \
              sec-intermediate-gitleaks \
              sec-intermediate-cyclonedx \
              sec-intermediate-osv
            do
              id=$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts" \
                --jq ".artifacts[] | select(.name == \"$name\") | .id" 2>/dev/null | head -n1)
              if [[ -n "$id" ]]; then
                echo "Deleting artifact $name (id=$id)"
                gh api -X DELETE "/repos/$GITHUB_REPOSITORY/actions/artifacts/$id" || true
              else
                echo "Skipping $name (not found)"
              fi
            done

    package:
      name: Package Deployable JAR
      runs-on: ubuntu-latest
      needs: [security-consolidated-report]
      # Run once the consolidated report is built.
      if: ${{ always() && needs.security-consolidated-report.result == 'success' }}

      steps:
        - name: Checkout
          uses: actions/checkout@v5

        - name: Set up JDK 17
          uses: actions/setup-java@v5
          with:
            distribution: temurin
            java-version: '17'
            cache: maven

        - name: Build deployable Mule application JAR
          env:
            ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
            ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
          run: |
            mvn package -DskipTests \
              --settings .github/settings.xml \
              --batch-mode \
              --no-transfer-progress

        - name: List packaged artifacts
          run: |
            echo "=== Contents of target/ ==="
            ls -lah target/*.jar 2>/dev/null || echo "no JARs found"

        - name: Publish deployable JAR artifact
          uses: actions/upload-artifact@v7
          with:
            name: test-automation-deployable-jar
            path: |
              target/*-mule-application.jar
              target/*.jar
            if-no-files-found: error
